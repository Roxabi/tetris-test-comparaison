name: Deploy tetris.roxabi.dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Stage site (exclude 531MB OBS source)
        run: |
          rsync -a --exclude '.git' --exclude 'out/_tmp' --exclude '.wrangler' \
            --exclude 'video/source' --exclude 'video/__pycache__' \
            --exclude 'video/assets/audio' --exclude 'node_modules' \
            ./ /tmp/tetris-pages-deploy/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: b5e90be971920ce406f7b679c4f1cd33
          command: pages deploy /tmp/tetris-pages-deploy --project-name=tetris --branch=main